workflows:
  hanzade-ios-ipa:
    name: Hanzade Kuruyemiş iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        BUNDLE_ID: com.hanzadekuruyemis.app
        APPLE_TEAM_ID: H8Z7YGN6J5
        XCODE_WORKSPACE: "Hanzade Kuruyemiş.xcworkspace"
        XCODE_SCHEME: "Hanzade Kuruyemiş"

    scripts:
      - name: CocoaPods kur
        script: |
          set -e
          cd src
          pod install

      - name: Code signing ayarla
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates

          PROFILE=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" \
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" \
            -name "*.mobileprovision" 2>/dev/null | head -1)

          if [ -z "$PROFILE" ]; then
            echo "ERROR: Provisioning profile indirilemedi"
            exit 1
          fi
          echo "Profile: $PROFILE"

          cd src
          xcode-project use-profiles \
            --project "Hanzade Kuruyemiş.xcodeproj" \
            --profile "$PROFILE" \
            --archive-method app-store \
            --code-signing-setup-verbose-logging

      - name: IPA derle
        script: |
          set -e
          cd src
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
