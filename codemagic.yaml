workflows:
  hanzade-ios-ipa:
    name: Hanzade Kuruyemiş iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        BUNDLE_ID: com.hanzadekuruyemis.app
        APPLE_TEAM_ID: H8Z7YGN6J5
        XCODE_PROJECT: "Hanzade Kuruyemiş.xcodeproj"
        XCODE_SCHEME: "Hanzade Kuruyemiş"

    scripts:
      - name: Code signing ayarla
        script: |
          set -e
          keychain initialize

          # Mevcut distribution sertifikalarini temizle (409 limit hatasini onler)
          echo "=== Cleaning up existing distribution certificates ==="
          for CTYPE in DISTRIBUTION IOS_DISTRIBUTION; do
            app-store-connect list-certificates --type "$CTYPE" --json 2>/dev/null > /tmp/certs.json || echo "[]" > /tmp/certs.json
            echo "--- type: $CTYPE ---"
            IDS=$(python3 -c "import json; d=json.load(open('/tmp/certs.json')); print('\n'.join(c.get('id','') for c in d))" 2>/dev/null || true)
            for CID in $IDS; do
              if [ -n "$CID" ]; then
                echo "Deleting certificate: $CID"
                app-store-connect delete-certificate "$CID" || echo "  (could not delete $CID)"
              fi
            done
          done

          CERT_KEY_PATH="$HOME/cert_key.pem"
          openssl genrsa -out "$CERT_KEY_PATH" 2048

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles \
            --certificate-key=@file:"$CERT_KEY_PATH"

          keychain add-certificates

          cd src
          xcode-project use-profiles \
            --project "Hanzade Kuruyemiş.xcodeproj" \
            --archive-method app-store

      - name: IPA derle
        script: |
          set -e
          cd src
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config "Release"

    artifacts:
      - src/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - "**/*.ipa"
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
