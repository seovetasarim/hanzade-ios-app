workflows:
  hanzade-ios-ipa:
    name: Hanzade Kuruyemiş iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        BUNDLE_ID: com.hanzadekuruyemis.app
        APPLE_TEAM_ID: H8Z7YGN6J5
        XCODE_WORKSPACE: "Hanzade Kuruyemiş.xcworkspace"
        XCODE_SCHEME: "Hanzade Kuruyemiş"

    scripts:
      - name: CocoaPods kur
        script: |
          cd src
          pod install

      - name: App ID capabilities ayarla
        script: |
          BUNDLE_ID_RESOURCE_ID=$(app-store-connect bundle-ids list \
            --bundle-id-identifier "$BUNDLE_ID" \
            --strict-match-identifier \
            --json | python3 -c "import sys,json; data=json.load(sys.stdin); items=data if isinstance(data,list) else data.get('data',[]); print(items[0]['id'])")
          app-store-connect bundle-ids enable-capabilities "$BUNDLE_ID_RESOURCE_ID" \
            --capability "Push Notifications" "Associated Domains" || true

      - name: Code signing ayarla
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create --delete-stale-profiles
          keychain add-certificates
          cd src
          xcode-project use-profiles --code-signing-setup-verbose-logging

      - name: IPA derle
        script: |
          cd src
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
