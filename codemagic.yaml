# Codemagic — Mac olmadan .ipa üretmek için
# Kurulum: https://codemagic.io (ücretsiz plan var)
#
# 1) codemagic.io → Sign up
# 2) Applications → Add application → Git veya zip yükle
# 3) Apple Developer bağla (Team settings → Integrations → Apple Developer Portal)
# 4) Bu yaml dosyasını repo köküne koy veya Codemagic UI'dan workflow oluştur
# 5) Start build → bitince .ipa indir veya doğrudan App Store Connect'e gönder

workflows:
  hanzade-ios-ipa:
    name: Hanzade Kuruyemiş iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hanzadekuruyemis.app
      vars:
        BUNDLE_ID: com.hanzadekuruyemis.app
        XCODE_WORKSPACE: "Hanzade Kuruyemiş.xcworkspace"
        XCODE_SCHEME: "Hanzade Kuruyemiş"
        # APP_STORE_APP_ID: App Store Connect'te uygulama oluşturduktan sonra eklenebilir

    scripts:
      - name: CocoaPods kur
        script: |
          cd src
          pod install

      - name: IPA derle
        script: |
          cd src
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    # Apple Active olunca publishing eklenebilir (App Store Connect API key gerekir)
