workflows:
  hanzade-ios-ipa:
    name: Hanzade Kuruyemiş iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        - hanzade_signing
      vars:
        BUNDLE_ID: com.hanzadekuruyemis.app
        APPLE_TEAM_ID: H8Z7YGN6J5
        XCODE_PROJECT: "Hanzade Kuruyemiş.xcodeproj"
        XCODE_SCHEME: "Hanzade Kuruyemiş"

    scripts:
      - name: Code signing ayarla
        script: |
          set -e
          keychain initialize

          CERT_KEY_PATH="$HOME/cert_key.pem"

          if [ -n "$CERT_KEY_BASE64" ]; then
            echo "=== Reusing STORED certificate private key (stable cert) ==="
            echo "$CERT_KEY_BASE64" | base64 --decode > "$CERT_KEY_PATH" 2>/dev/null || echo "$CERT_KEY_BASE64" | base64 -D > "$CERT_KEY_PATH"
          else
            echo "=== BOOTSTRAP: generating a NEW private key ==="
            openssl genrsa -out "$CERT_KEY_PATH" 2048
            echo ""
            echo "################################################################"
            echo "# COPY the single line between the markers below and save it as #"
            echo "# a SECURE environment variable named  CERT_KEY_BASE64          #"
            echo "################################################################"
            echo "-----CERT_KEY_BASE64_START-----"
            base64 < "$CERT_KEY_PATH" | tr -d '\n'
            echo ""
            echo "-----CERT_KEY_BASE64_END-----"
            echo "################################################################"
          fi

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:"$CERT_KEY_PATH"

          keychain add-certificates

          cd src
          xcode-project use-profiles \
            --project "Hanzade Kuruyemiş.xcodeproj" \
            --archive-method app-store

      - name: IPA derle
        script: |
          set -e
          cd src
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config "Release"

      - name: Imzayi dogrula (diagnostic)
        script: |
          set +e
          cd src
          echo "=================== ARCHIVE app (unzip YOK) ==================="
          ARCHIVE=$(find "$HOME/Library/Developer/Xcode/Archives" build/ios -name "*.xcarchive" 2>/dev/null | head -n 1)
          echo "ARCHIVE: $ARCHIVE"
          ARCHAPP=$(ls -d "$ARCHIVE"/Products/Applications/*.app 2>/dev/null | head -n 1)
          echo "ARCHIVE APP: $ARCHAPP"
          echo "--- verify archive app (strict) ---"
          codesign --verify --strict --verbose=4 "$ARCHAPP" 2>&1
          echo "--- archive app bundle icerik listesi ---"
          find "$ARCHAPP" -maxdepth 2 2>&1
          echo "=================== IPA (unzip) ==================="
          IPA=$(ls build/ios/ipa/*.ipa | head -n 1)
          echo "IPA: $IPA"
          WORK=$(mktemp -d)
          unzip -q "$IPA" -d "$WORK"
          APP=$(ls -d "$WORK"/Payload/*.app | head -n 1)
          echo "APP: $APP"
          echo "--- codesign -dvvv ---"
          codesign -dvvv "$APP" 2>&1
          echo "--- codesign verify (strict, deep) ---"
          codesign --verify --deep --strict --verbose=4 "$APP" 2>&1
          echo "--- IPA app bundle icerik listesi ---"
          find "$APP" -maxdepth 2 2>&1
          echo "--- entitlements ---"
          codesign -d --entitlements :- "$APP" 2>&1
          echo "=================== DONE ==================="

    artifacts:
      - src/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - "**/*.ipa"
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
