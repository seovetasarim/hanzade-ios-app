workflows:
  hanzade-ios-ipa:
    name: Hanzade Kuruyemiş iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        - hanzade_signing
      vars:
        BUNDLE_ID: com.hanzadekuruyemis.app
        APPLE_TEAM_ID: H8Z7YGN6J5
        XCODE_PROJECT: "Hanzade Kuruyemiş.xcodeproj"
        XCODE_SCHEME: "Hanzade Kuruyemiş"

    scripts:
      - name: Code signing ayarla
        script: |
          set -e
          keychain initialize

          CERT_KEY_PATH="$HOME/cert_key.pem"

          if [ -n "$CERT_KEY_BASE64" ]; then
            echo "=== Reusing STORED certificate private key (stable cert) ==="
            echo "$CERT_KEY_BASE64" | base64 --decode > "$CERT_KEY_PATH" 2>/dev/null || echo "$CERT_KEY_BASE64" | base64 -D > "$CERT_KEY_PATH"
          else
            echo "=== BOOTSTRAP: generating a NEW private key ==="
            openssl genrsa -out "$CERT_KEY_PATH" 2048
            echo ""
            echo "################################################################"
            echo "# COPY the single line between the markers below and save it as #"
            echo "# a SECURE environment variable named  CERT_KEY_BASE64          #"
            echo "################################################################"
            echo "-----CERT_KEY_BASE64_START-----"
            base64 < "$CERT_KEY_PATH" | tr -d '\n'
            echo ""
            echo "-----CERT_KEY_BASE64_END-----"
            echo "################################################################"
          fi

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:"$CERT_KEY_PATH"

          keychain add-certificates

          cd src
          xcode-project use-profiles \
            --project "Hanzade Kuruyemiş.xcodeproj" \
            --archive-method app-store

      - name: IPA derle
        script: |
          set -e
          cd src
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config "Release"

      - name: Imzayi dogrula (diagnostic)
        script: |
          set +e
          cd src
          IPA=$(ls build/ios/ipa/*.ipa | head -n 1)
          echo "IPA: $IPA"
          WORK=$(mktemp -d)
          unzip -q "$IPA" -d "$WORK"
          APP=$(ls -d "$WORK"/Payload/*.app | head -n 1)
          echo "APP: $APP"
          echo "=================== codesign -dvvv ==================="
          codesign -dvvv "$APP" 2>&1
          echo "=================== codesign verify (strict) ==================="
          codesign --verify --deep --strict --verbose=4 "$APP" 2>&1
          echo "=================== entitlements ==================="
          codesign -d --entitlements :- "$APP" 2>&1
          echo "=================== embedded.mobileprovision ==================="
          security cms -D -i "$APP/embedded.mobileprovision" > "$WORK/profile.plist" 2>/dev/null
          echo "--- Profile Name ---"
          /usr/libexec/PlistBuddy -c "Print :Name" "$WORK/profile.plist" 2>&1
          echo "--- ProvisionedDevices (App Store profilinde OLMAMALI) ---"
          /usr/libexec/PlistBuddy -c "Print :ProvisionedDevices" "$WORK/profile.plist" 2>&1 | head -n 3
          echo "--- get-task-allow (false/yok olmali) ---"
          /usr/libexec/PlistBuddy -c "Print :Entitlements:get-task-allow" "$WORK/profile.plist" 2>&1
          echo "--- application-identifier ---"
          /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$WORK/profile.plist" 2>&1
          echo "--- Profildeki sertifika (DeveloperCertificates) ---"
          /usr/libexec/PlistBuddy -c "Print :DeveloperCertificates:0" "$WORK/profile.plist" 2>/dev/null | head -c 60; echo ""
          echo "=================== export_options.plist ==================="
          cat "$HOME/export_options.plist" 2>/dev/null
          echo "=================== DONE ==================="

    artifacts:
      - src/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - "**/*.ipa"
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
